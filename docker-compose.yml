version: '3.8'

services:
  picker-assistant:
    build: .
    container_name: picker-app
    restart: always
    ports:
      - "80:8080"
    environment:
      - NODE_ENV=production
    volumes:
      - ./shared-data:/app/shared-data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
